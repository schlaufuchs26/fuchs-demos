<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fuchs & Hasen — Ecosystem Simulation</title>
<script>p5.disableFriendlyErrors = true;</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; background: #0a0f0a; }
  canvas { display: block; }
</style>
</head>
<body>
<script>
// ═══════════════════════════════════════════
//  FUCHS & HASEN — Predator-Prey Ecosystem
//  A living meadow simulation
// ═══════════════════════════════════════════

const CONFIG = {
  rabbitDensity: 18000,   // px² per rabbit
  foxDensity: 140000,     // px² per fox
  rabbitFleeRange: 130,
  foxHuntRange: 160,
  rabbitSpeed: 1.6,
  foxSpeed: 1.15,
  rabbitBreedCost: 35,
  foxBreedCost: 50,
  rabbitBreedThreshold: 85,
  foxBreedThreshold: 110,
  rabbitMaxAge: 3600,
  foxMaxAge: 5400,
  dayLength: 3600,        // frames per full day cycle (~60s at 60fps)
  trailFade: 1.8,         // % alpha of fade overlay per frame (trail persistence ~55 frames)
  catchParticles: 12,     // particles on catch
};

const PALETTE = {
  grassTop: '#1f3c1c',
  grassMid: '#356828',
  grassBot: '#1c3418',
  tuftHue: [90, 110],
  rabbitBody: '#f0eed5',
  rabbitEar: '#f5f0e0',
  foxBody: '#e87830',
  foxDark: '#c05520',
  foxWhite: '#faf5f0',
  trailFox: [22, 85, 80, 22],
  trailRabbit: [0, 0, 90, 10],
  nightOverlay: [240, 30, 10, 55],
};

// ── State ──────────────────────────────
let rabbits = [];
let foxes = [];
let grassBuffer;
let trailBuffer;
let dayTime = 0;        // 0..dayLength

// ── p5.js Lifecycle ────────────────────

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  noiseSeed(floor(random(99999)));
  randomSeed(floor(random(99999)));

  const area = width * height;
  const nRabbits = max(5, floor(area / CONFIG.rabbitDensity));
  const nFoxes = max(2, floor(area / CONFIG.foxDensity));

  grassBuffer = createGraphics(width, height);
  generateGrass();

  trailBuffer = createGraphics(width, height);
  trailBuffer.colorMode(HSB, 360, 100, 100, 100);

  for (let i = 0; i < nRabbits; i++) rabbits.push(new Rabbit());
  for (let i = 0; i < nFoxes; i++) foxes.push(new Fox());

  dayTime = random(CONFIG.dayLength);
}

function draw() {
  dayTime = (dayTime + 1) % CONFIG.dayLength;

  // ── Update ─────────────────────────
  for (let r of rabbits) r.update();
  for (let f of foxes) f.update();

  // Remove dead
  rabbits = rabbits.filter(r => r.alive);
  foxes = foxes.filter(f => f.alive);

  // Ensure minimum population
  if (rabbits.length < 3) {
    for (let i = 0; i < 5; i++) rabbits.push(new Rabbit());
  }
  if (foxes.length < 1) {
    foxes.push(new Fox());
  }

  // ── Render ─────────────────────────
  // Grass
  image(grassBuffer, 0, 0);

  // Trails: fade
  trailBuffer.push();
  trailBuffer.noStroke();
  trailBuffer.fill(0, 0, 0, CONFIG.trailFade);
  trailBuffer.rect(0, 0, width, height);
  trailBuffer.pop();

  // Trails: draw new
  for (let r of rabbits) r.drawTrail();
  for (let f of foxes) f.drawTrail();
  image(trailBuffer, 0, 0);

  // Animals
  for (let r of rabbits) r.draw();
  for (let f of foxes) f.draw();

  // Day/night overlay
  drawDayNightOverlay();

  // Catch particles
  drawParticles();

  // UI
  drawUI();
}

// ── Grass Generation ──────────────────

function generateGrass() {
  grassBuffer.colorMode(HSB, 360, 100, 100);
  const ctx = grassBuffer.drawingContext;

  // Base gradient
  const grad = ctx.createLinearGradient(0, 0, 0, height);
  grad.addColorStop(0, PALETTE.grassTop);
  grad.addColorStop(0.5, PALETTE.grassMid);
  grad.addColorStop(1, PALETTE.grassBot);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, width, height);

  // Scattered tufts
  grassBuffer.noStroke();
  const n = floor(width * height / 400);
  for (let i = 0; i < n; i++) {
    const x = random(width);
    const y = random(height);
    const nv = noise(x * 0.008, y * 0.008);
    if (nv < 0.3) continue;
    const hue = map(nv, 0.3, 1, PALETTE.tuftHue[0], PALETTE.tuftHue[1]);
    const alpha = map(nv, 0.3, 1, 12, 35);
    const sz = map(nv, 0.3, 1, 3, 9);
    grassBuffer.fill(hue, 28, 48, alpha);
    grassBuffer.ellipse(x, y, sz, sz);
  }

  // Scattered tiny flowers
  const flowerN = floor(n * 0.2);
  for (let i = 0; i < flowerN; i++) {
    const x = random(width);
    const y = random(height);
    if (noise(x * 0.025, y * 0.025) < 0.5) continue;
    // Petals
    grassBuffer.fill(58, 12, 96, 32);
    for (let a = 0; a < TWO_PI; a += PI / 3) {
      grassBuffer.ellipse(x + cos(a) * 2, y + sin(a) * 2, 2.5, 2.5);
    }
    // Center
    grassBuffer.fill(50, 25, 88, 25);
    grassBuffer.ellipse(x, y, 2, 2);
  }
}

// ── Day/Night Cycle ──────────────────

function drawDayNightOverlay() {
  const phase = dayTime / CONFIG.dayLength; // 0..1
  // Night peaks at phase 0.5, dawn at 0.25, dusk at 0.75
  const nightStrength = sin(phase * TWO_PI) * -1; // -1..1, -1=noon, 1=midnight
  const alpha = map(nightStrength, 0, 1, 0, PALETTE.nightOverlay[3]);
  if (alpha < 0.01) return;

  push();
  noStroke();
  fill(
    PALETTE.nightOverlay[0],
    PALETTE.nightOverlay[1],
    PALETTE.nightOverlay[2],
    alpha
  );
  rect(0, 0, width, height);
  pop();
}

// ── UI ────────────────────────────────

function drawUI() {
  push();
  textAlign(RIGHT, TOP);
  textSize(13);
  noStroke();

  // Background panel
  const uiW = 170, uiH = 55, uiX = width - uiW - 16, uiY = 14;
  fill(0, 0, 0, 0.45);
  rect(uiX, uiY, uiW, uiH, 8);

  // Text
  fill(0, 0, 95);
  text(`🦊 Füchse: ${foxes.length}`, width - 24, 20);
  text(`🐇 Hasen: ${rabbits.length}`, width - 24, 40);

  // Time indicator
  const phase = dayTime / CONFIG.dayLength;
  const timeIcon = phase < 0.25 ? '🌅' : phase < 0.45 ? '☀️' : phase < 0.55 ? '🌙' : phase < 0.75 ? '🌇' : '☀️';
  text(timeIcon, width - 48, 20);

  pop();
}

// ═══════════════════════════════════════
//  ENTITY CLASSES
// ═══════════════════════════════════════

// ── Rabbit ────────────────────────────

class Rabbit {
  constructor(x, y) {
    this.x = x ?? random(40, width - 40);
    this.y = y ?? random(40, height - 40);
    this.vx = 0;
    this.vy = 0;
    this.angle = random(TWO_PI);
    this.energy = 100;
    this.age = 0;
    this.alive = true;
    this.state = 'wander'; // wander | flee
    this.wanderDir = random(TWO_PI);
    this.wanderTimer = 0;
  }

  update() {
    this.age++;
    this.energy -= 0.04;

    // Find nearest fox
    let nearestFox = null;
    let nearestDist = CONFIG.rabbitFleeRange;
    for (let f of foxes) {
      const d = dist(this.x, this.y, f.x, f.y);
      if (d < nearestDist) { nearestDist = d; nearestFox = f; }
    }

    if (nearestFox) {
      // Flee!
      this.state = 'flee';
      const dx = this.x - nearestFox.x;
      const dy = this.y - nearestFox.y;
      const d = max(nearestDist, 0.1);
      // Stronger flee when closer
      const urgency = map(nearestDist, 20, CONFIG.rabbitFleeRange, 1, 0.3);
      this.vx = (dx / d) * CONFIG.rabbitSpeed * urgency;
      this.vy = (dy / d) * CONFIG.rabbitSpeed * urgency;
    } else {
      this.state = 'wander';
      // Wandering with persistence
      this.wanderTimer--;
      if (this.wanderTimer <= 0) {
        this.wanderDir += random(-0.8, 0.8);
        this.wanderTimer = floor(random(20, 60));
      }
      const speed = CONFIG.rabbitSpeed * 0.5;
      this.vx = cos(this.wanderDir) * speed;
      this.vy = sin(this.wanderDir) * speed;
    }

    // Apply velocity
    this.x += this.vx;
    this.y += this.vy;

    // Update angle toward movement direction
    if (abs(this.vx) > 0.01 || abs(this.vy) > 0.01) {
      this.angle = lerp(this.angle, atan2(this.vy, this.vx), 0.15);
    }

    // Boundary avoidance
    const margin = 30;
    if (this.x < margin) this.vx += 0.5;
    if (this.x > width - margin) this.vx -= 0.5;
    if (this.y < margin) this.vy += 0.5;
    if (this.y > height - margin) this.vy -= 0.5;

    // Clamp position
    this.x = constrain(this.x, 5, width - 5);
    this.y = constrain(this.y, 5, height - 5);

    // Breeding
    if (this.energy > CONFIG.rabbitBreedThreshold && this.age > 200) {
      // Find nearby rabbit
      for (let r of rabbits) {
        if (r === this || !r.alive) continue;
        if (r.energy < CONFIG.rabbitBreedThreshold) continue;
        if (dist(this.x, this.y, r.x, r.y) < 50) {
          if (random() < 0.003) {
            this.energy -= CONFIG.rabbitBreedCost;
            r.energy -= CONFIG.rabbitBreedCost;
            const cx = (this.x + r.x) / 2 + random(-20, 20);
            const cy = (this.y + r.y) / 2 + random(-20, 20);
            rabbits.push(new Rabbit(cx, cy));
            break; // One baby per frame max
          }
        }
      }
    }

    // Death
    if (this.energy <= 0 || this.age > CONFIG.rabbitMaxAge) {
      this.alive = false;
    }
  }

  drawTrail() {
    if (this.state === 'flee') {
      trailBuffer.stroke(PALETTE.trailRabbit);
      trailBuffer.strokeWeight(1.5);
    } else {
      trailBuffer.stroke(0, 0, 85, 5);
      trailBuffer.strokeWeight(0.8);
    }
    trailBuffer.point(this.x, this.y);
  }

  draw() {
    push();
    translate(this.x, this.y);
    rotate(this.angle);

    // Ears
    fill(PALETTE.rabbitEar);
    noStroke();
    ellipse(-2, -3.5, 2.5, 6);
    ellipse(-2, 3.5, 2.5, 6);
    // Inner ears
    fill(0, 0, 85, 0.5);
    ellipse(-2, -3.5, 1.2, 4);
    ellipse(-2, 3.5, 1.2, 4);

    // Body
    fill(PALETTE.rabbitBody);
    noStroke();
    ellipse(0, 0, 7, 6);

    // Tail
    fill(0, 0, 98);
    ellipse(-4, 0, 3, 2.5);

    // Eye
    fill(0, 0, 20);
    ellipse(3, -1, 1.5, 1.5);

    pop();
  }
}

// ── Fox ───────────────────────────────

class Fox {
  constructor(x, y) {
    this.x = x ?? random(40, width - 40);
    this.y = y ?? random(40, height - 40);
    this.vx = 0;
    this.vy = 0;
    this.angle = random(TWO_PI);
    this.energy = 120;
    this.age = 0;
    this.alive = true;
    this.state = 'wander'; // wander | hunt
    this.wanderDir = random(TWO_PI);
    this.wanderTimer = 0;
    this.targetRabbit = null;
  }

  update() {
    this.age++;
    this.energy -= 0.07;

    // Find nearest rabbit
    let nearest = null;
    let nearestDist = CONFIG.foxHuntRange;
    for (let r of rabbits) {
      if (!r.alive) continue;
      const d = dist(this.x, this.y, r.x, r.y);
      if (d < nearestDist) { nearestDist = d; nearest = r; }
    }

    this.targetRabbit = nearest;

    if (nearest) {
      // Hunt!
      this.state = 'hunt';
      const dx = nearest.x - this.x;
      const dy = nearest.y - this.y;
      const d = max(nearestDist, 0.1);
      this.vx = (dx / d) * CONFIG.foxSpeed;
      this.vy = (dy / d) * CONFIG.foxSpeed;

      // Catch?
      if (nearestDist < 9) {
        nearest.alive = false;
        this.energy = min(this.energy + 55, 200);
        spawnCatchParticles(nearest.x, nearest.y);
      }
    } else {
      this.state = 'wander';
      this.wanderTimer--;
      if (this.wanderTimer <= 0) {
        this.wanderDir += random(-0.5, 0.5);
        this.wanderTimer = floor(random(30, 80));
      }
      const speed = CONFIG.foxSpeed * 0.55;
      this.vx = cos(this.wanderDir) * speed;
      this.vy = sin(this.wanderDir) * speed;
    }

    this.x += this.vx;
    this.y += this.vy;

    if (abs(this.vx) > 0.01 || abs(this.vy) > 0.01) {
      this.angle = lerp(this.angle, atan2(this.vy, this.vx), 0.1);
    }

    // Boundary
    const margin = 30;
    if (this.x < margin) this.vx += 0.3;
    if (this.x > width - margin) this.vx -= 0.3;
    if (this.y < margin) this.vy += 0.3;
    if (this.y > height - margin) this.vy -= 0.3;
    this.x = constrain(this.x, 5, width - 5);
    this.y = constrain(this.y, 5, height - 5);

    // Breeding
    if (this.energy > CONFIG.foxBreedThreshold && this.age > 400) {
      for (let f of foxes) {
        if (f === this || !f.alive) continue;
        if (f.energy < CONFIG.foxBreedThreshold) continue;
        if (dist(this.x, this.y, f.x, f.y) < 60) {
          if (random() < 0.0015) {
            this.energy -= CONFIG.foxBreedCost;
            f.energy -= CONFIG.foxBreedCost;
            const cx = (this.x + f.x) / 2 + random(-30, 30);
            const cy = (this.y + f.y) / 2 + random(-30, 30);
            foxes.push(new Fox(cx, cy));
            break;
          }
        }
      }
    }

    if (this.energy <= 0 || this.age > CONFIG.foxMaxAge) {
      this.alive = false;
    }
  }

  drawTrail() {
    if (this.state === 'hunt') {
      trailBuffer.stroke(PALETTE.trailFox);
      trailBuffer.strokeWeight(1.8);
    } else {
      trailBuffer.stroke(20, 50, 65, 6);
      trailBuffer.strokeWeight(0.8);
    }
    trailBuffer.point(this.x, this.y);
  }

  draw() {
    push();
    translate(this.x, this.y);
    rotate(this.angle);

    // Tail
    fill(PALETTE.foxBody);
    noStroke();
    ellipse(-8, 0, 9, 5);
    // White tail tip
    fill(PALETTE.foxWhite);
    ellipse(-11, 0, 4, 3);

    // Body
    fill(PALETTE.foxBody);
    ellipse(0, 0, 11, 7);

    // Head
    fill(PALETTE.foxBody);
    ellipse(7, 0, 7, 6);

    // Ears
    fill(PALETTE.foxBody);
    triangle(4, -4, 5, -9, 8, -4);
    triangle(4, 4, 5, 9, 8, 4);
    fill(PALETTE.foxDark);
    triangle(5, -5, 5.5, -8, 7, -5);
    triangle(5, 5, 5.5, 8, 7, 5);

    // Snout
    fill(PALETTE.foxWhite);
    ellipse(10, 0, 3.5, 3);
    fill(0, 0, 15);
    ellipse(10.5, 0, 1.2, 1.2);

    // Eyes
    fill(0, 0, 10);
    ellipse(8, -1.8, 1.8, 1.8);
    ellipse(8, 1.8, 1.8, 1.8);
    fill(0, 0, 95);
    ellipse(8.3, -1.8, 0.8, 0.8);
    ellipse(8.3, 1.8, 0.8, 0.8);

    pop();
  }
}

// ── Catch Particles ───────────────────

let particles = [];

function spawnCatchParticles(x, y) {
  for (let i = 0; i < CONFIG.catchParticles; i++) {
    particles.push({
      x, y,
      vx: random(-3, 3),
      vy: random(-3, 3),
      life: 1,
      decay: random(0.02, 0.05),
      hue: random(20, 40),
    });
  }
}

function drawParticles() {
  for (let p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    p.life -= p.decay;
    if (p.life > 0) {
      noStroke();
      fill(p.hue, 70, 90, p.life);
      ellipse(p.x, p.y, 3 * p.life, 3 * p.life);
    }
  }
  particles = particles.filter(p => p.life > 0);
}

// ── Interaction ──────────────────────

function mousePressed() {
  if (mouseButton === LEFT) {
    rabbits.push(new Rabbit(mouseX, mouseY));
  }
}

function keyPressed() {
  if (key === 'f' || key === 'F') {
    foxes.push(new Fox(mouseX || width / 2, mouseY || height / 2));
  }
  if (key === 'r' || key === 'R') {
    rabbits = [];
    foxes = [];
    particles = [];
    trailBuffer.clear();
    const area = width * height;
    for (let i = 0; i < max(5, floor(area / CONFIG.rabbitDensity)); i++) rabbits.push(new Rabbit());
    for (let i = 0; i < max(2, floor(area / CONFIG.foxDensity)); i++) foxes.push(new Fox());
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  grassBuffer = createGraphics(width, height);
  generateGrass();
  const oldTrail = trailBuffer;
  trailBuffer = createGraphics(width, height);
  trailBuffer.colorMode(HSB, 360, 100, 100, 100);
  if (oldTrail) {
    trailBuffer.image(oldTrail, 0, 0);
  }
}
</script>
</body>
</html>
